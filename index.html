<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Watermark Foto</title>
    <!-- Manggil file CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Auto Watermark Generator</h2>
        
        <div class="input-group">
            <label for="watermarkText">Teks Watermark:</label>
            <input type="text" id="watermarkText" value="© Hak Cipta 2026" placeholder="Masukkan teks watermark kamu">
        </div>

        <div class="input-group">
            <label for="folderInput">Pilih Folder Foto:</label>
            <!-- webkitdirectory memungkinkan pemilihan folder -->
            <input type="file" id="folderInput" webkitdirectory directory multiple>
        </div>

        <button id="processBtn">Proses Foto</button>
    </div>

    <div id="gallery"></div>

    <!-- Manggil file JavaScript -->
    <script src="script.js"></script>
</body>
</html>
